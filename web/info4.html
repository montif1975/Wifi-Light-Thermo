<!doctype html>
<html>
<head>
<meta charset=utf-8>
<meta http-equiv=refresh content=15>
<style>
body{margin:0;background:#000;color:#0f0;font:48px monospace;
display:flex;align-items:center;justify-content:center;height:100vh}
#c{width:260px}
.r{display:flex;justify-content:space-between;margin:12px 0}
.l{color:#777;font-size:18px}
.v{font-weight:bold}
.d{color:#ffffff;font-size:18px;text-align:center;margin-top:20px}
</style>
</head>
<body>
<div id=c>
<h2 style="color:#ffffff;font-size:18px">Sensor info</h2>
<div class=r><span class=l>TEMP</span><span class=v>24.5 °C</span></div>
<div class=r><span class=l>HUM</span><span class=v>60 %RH</span></div>
<div class=d id=datetime>
<h3 id="datetime"></h3>
<script>
document.getElementById("datetime").textContent = new Date().toLocaleString();
</script>
</div>
</div>
</body>
</html>

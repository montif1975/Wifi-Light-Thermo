<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sensor info</title>

<style>

body {
  font-family: Arial, sans-serif;
  background-color: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.info-container {
  background: black;
  border-radius: 10px;
  padding: 25px;
  width: 420px;
  box-shadow: 0 0 20px rgba(0,255,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #aaa;
  font-size: 1.3rem;
}

.info-data {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.label {
  font-size: 1.2rem;
  color: #888;
}

.value {
  font-family: Consolas, Menlo, Monaco, monospace;
  font-size: 2.6rem;
  color: rgb(0,255,0);
  font-weight: bold;
}

#datetime {
  text-align: center;
  margin-top: 25px;
  color: rgb(90,100,240);
  font-size: 1.1rem;
}

</style>

<script>
setInterval(() => { location.reload(); }, 30000);
</script>

</head>

<body>

<div class="info-container">

<h2>WiFi Sensor (ver. 0.1)</h2>

<div class="info-data">

<div class="row">
<span class="label">Temperature</span>
<span class="value">24.5 °C</span>
</div>

<div class="row">
<span class="label">Humidity</span>
<span class="value">60 %RH</span>
</div>

</div>

<h3 id="datetime"></h3>

<script>
document.getElementById("datetime").textContent =
  new Date().toLocaleString();
</script>

</div>

</body>
</html>
